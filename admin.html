<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOBY 어드민</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #E8607A;
    --pink-light: #FCEEF1;
    --green: #2D6A4F;
    --green-light: #E6F0EC;
    --text: #2D2D2D;
    --sub: #7A7A7A;
    --bg: #F7F7F5;
    --white: #FFFFFF;
    --border: #E8E8E8;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: var(--white);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .login-logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 32px;
    color: var(--pink);
    margin-bottom: 4px;
  }
  .login-sub { font-size: 13px; color: var(--sub); margin-bottom: 28px; }
  .login-input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--pink); }
  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--pink);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .login-err { font-size: 12px; color: var(--pink); margin-top: 8px; display: none; }

  /* ADMIN */
  #adminScreen { display: none; }
  .topbar {
    background: var(--white);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-logo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 22px; color: var(--pink); }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .btn-export {
    padding: 9px 16px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-logout {
    padding: 9px 14px;
    background: var(--bg);
    color: var(--sub);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .admin-body { padding: 24px; max-width: 800px; margin: 0 auto; }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .btn-add {
    padding: 8px 16px;
    background: var(--pink-light);
    color: var(--pink);
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* BRAND LIST */
  .brand-list { display: flex; flex-direction: column; gap: 10px; }

  .brand-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid var(--border);
  }
  .brand-num {
    width: 28px; height: 28px;
    background: var(--pink-light);
    color: var(--pink);
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-info { flex: 1; min-width: 0; }
  .brand-name { font-weight: 700; font-size: 15px; }
  .brand-meta { font-size: 12px; color: var(--sub); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag {
    background: var(--pink-light); color: var(--pink);
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 6px;
  }
  .coupon-tag {
    background: var(--green-light); color: var(--green);
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 6px;
  }
  .brand-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-edit {
    padding: 6px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
  }
  .btn-del {
    padding: 6px 12px;
    background: #FFF0F0;
    color: #E04040;
    border: 1px solid #FFCCCC;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
  }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 5px; display: block; }
  .form-input, .form-select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--white);
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--pink); }

  .cat-checkboxes { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-label {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .cat-label input { display: none; }
  .cat-label.checked {
    background: var(--pink);
    color: white;
    border-color: var(--pink);
  }

  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-save {
    flex: 1; padding: 13px;
    background: var(--pink); color: white;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-cancel {
    flex: 1; padding: 13px;
    background: var(--bg); color: var(--sub);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #2D2D2D; color: white;
    padding: 12px 24px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    z-index: 999; transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .export-note {
    background: var(--green-light);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--green);
    margin-top: 16px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🐾 SOBY</div>
    <div class="login-sub">어드민 페이지</div>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 틀렸어요</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="topbar">
    <div class="topbar-logo">🐾 SOBY 어드민</div>
    <div class="topbar-right">
      <button class="btn-export" onclick="exportFile()">📥 petfair.html 내보내기</button>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="section-title">
      참여 브랜드 관리
      <button class="btn-add" onclick="openModal()">+ 브랜드 추가</button>
    </div>
    <div class="brand-list" id="brandList"></div>
    <div class="export-note">
      💡 브랜드 수정 후 <b>petfair.html 내보내기</b> 버튼을 눌러 파일을 다운로드하고, GitHub에 업로드하면 반영돼요.
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">브랜드 추가</div>
    <div class="form-group">
      <label class="form-label">브랜드명 *</label>
      <input class="form-input" id="fName" placeholder="예: 쏘바이">
    </div>
    <div class="form-group">
      <label class="form-label">한줄 소개 *</label>
      <input class="form-input" id="fDesc" placeholder="예: 반려동물과 함께하는 일상을 더 따뜻하게">
    </div>
    <div class="form-group">
      <label class="form-label">구매 링크 *</label>
      <input class="form-input" id="fUrl" placeholder="https://...">
    </div>
    <div class="form-group">
      <label class="form-label">카테고리 (복수 선택 가능)</label>
      <div class="cat-checkboxes" id="catBoxes"></div>
    </div>
    <div class="form-group">
      <label class="form-label">할인/쿠폰 배지 (없으면 비워두세요)</label>
      <input class="form-input" id="fCoupon" placeholder="예: 10% 할인, 신제품 할인">
    </div>
    <div class="form-group">
      <label class="form-label">로고 이미지 URL (없으면 비워두세요)</label>
      <input class="form-input" id="fLogo" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveBrand()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PW = 'rkdud4523';
const CATS = ['사료', '간식', '리빙', '의류'];

let brands = JSON.parse(localStorage.getItem('soby_brands') || 'null') || [
  { id: 1, name: '쏘바이', logo: null, desc: '반려동물과 함께하는 일상을 더 따뜻하게', categories: ['리빙', '간식'], coupon: '신제품 할인', url: 'https://www.instagram.com/soby2017/' },
  { id: 2, name: 'Pawsome', logo: null, desc: '수의사가 설계한 건강한 자연식 사료 브랜드', categories: ['사료', '간식'], coupon: '10% 할인', url: 'https://example.com/pawsome' },
  { id: 3, name: '냥이부엌', logo: null, desc: '고양이를 위한 수제 간식 전문 브랜드', categories: ['간식'], coupon: '5,000원 쿠폰', url: 'https://example.com/nyangs' },
  { id: 4, name: 'PetHome', logo: null, desc: '반려동물과 함께하는 감각적인 리빙 소품', categories: ['리빙'], coupon: null, url: 'https://example.com/pethome' },
  { id: 5, name: 'FurStyle', logo: null, desc: '유기견 출신 모델과 함께 만드는 반려동물 패션', categories: ['의류'], coupon: '15% 할인', url: 'https://example.com/furstyle' },
  { id: 6, name: '멍냥상회', logo: null, desc: '강아지·고양이 모두를 위한 국산 수제 간식', categories: ['간식', '사료'], coupon: null, url: 'https://example.com/meongnyang' },
  { id: 7, name: 'Cozyden', logo: null, desc: '포근한 잠자리를 선물하는 프리미엄 펫 침구', categories: ['리빙', '의류'], coupon: '10% 할인', url: 'https://example.com/cozyden' },
  { id: 8, name: '댕댕옷장', logo: null, desc: '소형견부터 대형견까지 사이즈 다양한 펫 의류', categories: ['의류'], coupon: '신규 10% 할인', url: 'https://example.com/ddaeng' }
];

let editingId = null;

function save() { localStorage.setItem('soby_brands', JSON.stringify(brands)); }

function login() {
  if (document.getElementById('pwInput').value === PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    renderList();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

function renderList() {
  const el = document.getElementById('brandList');
  el.innerHTML = brands.map((b, i) => `
    <div class="brand-card">
      <div class="brand-num">${i+1}</div>
      <div class="brand-info">
        <div class="brand-name">${b.name}</div>
        <div class="brand-meta">${b.url}</div>
        <div class="brand-tags">
          ${b.categories.map(c => `<span class="tag">${c}</span>`).join('')}
          ${b.coupon ? `<span class="coupon-tag">${b.coupon}</span>` : ''}
        </div>
      </div>
      <div class="brand-actions">
        <button class="btn-edit" onclick="openModal(${b.id})">수정</button>
        <button class="btn-del" onclick="deleteBrand(${b.id})">삭제</button>
      </div>
    </div>
  `).join('');
}

function openModal(id = null) {
  editingId = id;
  const b = id ? brands.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = id ? '브랜드 수정' : '브랜드 추가';
  document.getElementById('fName').value = b?.name || '';
  document.getElementById('fDesc').value = b?.desc || '';
  document.getElementById('fUrl').value = b?.url || '';
  document.getElementById('fCoupon').value = b?.coupon || '';
  document.getElementById('fLogo').value = b?.logo || '';

  const boxes = document.getElementById('catBoxes');
  boxes.innerHTML = CATS.map(c => `
    <label class="cat-label ${b?.categories?.includes(c) ? 'checked' : ''}" onclick="toggleCat(this)">
      <input type="checkbox" value="${c}" ${b?.categories?.includes(c) ? 'checked' : ''}>${c}
    </label>
  `).join('');

  document.getElementById('modalBg').classList.add('open');
}

function toggleCat(el) {
  el.classList.toggle('checked');
  el.querySelector('input').checked = el.classList.contains('checked');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editingId = null;
}

function saveBrand() {
  const name = document.getElementById('fName').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  if (!name || !desc || !url) { showToast('브랜드명, 소개, 링크는 필수예요'); return; }

  const categories = [...document.querySelectorAll('#catBoxes input:checked')].map(el => el.value);
  const coupon = document.getElementById('fCoupon').value.trim() || null;
  const logo = document.getElementById('fLogo').value.trim() || null;

  if (editingId) {
    const i = brands.findIndex(x => x.id === editingId);
    brands[i] = { ...brands[i], name, desc, url, categories, coupon, logo };
    showToast('수정됐어요 ✓');
  } else {
    const newId = Math.max(0, ...brands.map(b => b.id)) + 1;
    brands.push({ id: newId, name, desc, url, categories, coupon, logo });
    showToast('브랜드가 추가됐어요 ✓');
  }
  save();
  renderList();
  closeModal();
}

function deleteBrand(id) {
  if (!confirm('삭제할까요?')) return;
  brands = brands.filter(b => b.id !== id);
  save();
  renderList();
  showToast('삭제됐어요');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function exportFile() {
  fetch('petfair.html')
    .then(r => r.text())
    .then(html => {
      const brandsJson = JSON.stringify(brands, null, 2);
      const updated = html.replace(
        /const BRANDS = \[[\s\S]*?\];/,
        'const BRANDS = ' + brandsJson + ';'
      );
      const blob = new Blob([updated], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'petfair.html';
      a.click();
      showToast('📥 petfair.html 다운로드 완료!');
    })
    .catch(() => {
      showToast('petfair.html이 같은 폴더에 있어야 해요');
    });
}
</script>
</body>
</html>
