<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOBY 온라인 펫페어</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #E8607A;
    --pink-light: #FCEEF1;
    --pink-mid: #F2AABB;
    --green: #2D6A4F;
    --green-light: #E6F0EC;
    --green-mid: #8BBDA8;
    --text: #2D2D2D;
    --text-sub: #7A7A7A;
    --bg: #FFF9FA;
    --white: #FFFFFF;
    --card-shadow: 0 2px 12px rgba(255,107,138,0.10);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--white);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255,107,138,0.08);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .logo {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: var(--pink);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo-paw {
    font-size: 22px;
  }

  .header-badge {
    background: var(--green-light);
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .header-sub {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: -10px;
    margin-bottom: 16px;
    font-weight: 400;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text-sub);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 1.5px solid var(--pink-mid);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: var(--white);
    color: var(--text);
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--pink);
  }

  .search-input::placeholder { color: #C0C0C0; }

  /* FILTER CHIPS */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 14px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.18s ease;
    background: var(--pink-light);
    color: var(--pink);
    border-color: var(--pink-light);
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }

  .chip.active {
    background: var(--pink);
    color: var(--white);
    border-color: var(--pink);
  }

  .chip:active { transform: scale(0.96); }

  /* COUNTER */
  .count-row {
    padding: 12px 20px 4px;
    font-size: 12px;
    color: var(--text-sub);
  }

  .count-row span { color: var(--pink); font-weight: 700; }

  /* GRID */
  .grid {
    padding: 8px 16px 140px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    border: 1.5px solid rgba(255,107,138,0.07);
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(255,107,138,0.10); }

  .card-logo {
    width: 100%;
    aspect-ratio: 1;
    background: var(--pink-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    position: relative;
    overflow: hidden;
  }

  .card-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-logo-placeholder {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--pink);
  }


  .card-slider { width: 100%; aspect-ratio: 1; position: relative; overflow: hidden; background: var(--pink-light); }
  .slider-track { display: flex; height: 100%; transition: transform 0.3s ease; will-change: transform; }
  .slider-slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--pink-light); }
  .slider-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .slider-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px;
    background: rgba(255,255,255,0.85);
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 12px; color: var(--text);
    z-index: 2; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    transition: background 0.15s;
  }
  .slider-arrow:active { background: rgba(255,255,255,1); }
  .slider-arrow.prev { left: 6px; }
  .slider-arrow.next { right: 6px; }
  .slider-arrow.hidden { display: none; }
  .slider-dots { position: absolute; bottom: 7px; left: 0; right: 0; display: flex; justify-content: center; gap: 5px; pointer-events: none; }
  .slider-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: background 0.2s; }
  .slider-dot.active { background: white; }
  .coupon-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--green);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 20px;
    font-family: 'Noto Sans KR', sans-serif;
    box-shadow: 0 2px 6px rgba(76,175,125,0.3);
  }

  .card-body {
    padding: 10px 12px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .card-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    line-height: 1.3;
    font-family: 'Nunito', sans-serif;
  }

  .card-desc {
    font-size: 11px;
    color: var(--text-sub);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 2px;
  }

  .tag {
    background: var(--pink-light);
    color: var(--pink);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 6px;
  }

  .tag.green {
    background: var(--green-light);
    color: var(--green);
  }

  /* EMPTY STATE */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 20px;
    color: var(--text-sub);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .empty-sub { font-size: 13px; }

  .card-cta {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 8px 0;
    background: var(--pink);
    color: white;
    font-size: 12px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .card-cta:active { transform: scale(0.97); background: #d04f68; }

  .cheer-strip {
    margin: 4px 16px 0;
    background: var(--green-light);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
  }
  .cheer-strip span { font-size: 16px; }

  /* FOOTER SUPPORT BANNER */
  .support-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, var(--pink) 0%, #FF8FA8 100%);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 99;
    box-shadow: 0 -4px 20px rgba(255,107,138,0.25);
  }

  .banner-left { font-size: 12px; line-height: 1.5; }
  .banner-left strong { font-weight: 700; font-size: 13px; display: block; }
  .banner-heart { font-size: 20px; margin-right: 6px; }

  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (min-width: 768px) {
    .header { padding: 20px 32px 0; }
    .grid { padding: 8px 32px 140px; grid-template-columns: repeat(4, 1fr); }
    .count-row { padding: 12px 32px 4px; }
  }

  /* CERT MODAL */
  .cert-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px;
    background: var(--green);
    color: white;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: "Noto Sans KR", sans-serif;
    width: 100%;
    transition: background 0.15s;
    grid-column: 1 / -1;
  }
  .cert-btn:active { background: #1e4f3a; }
  .insta-input-wrap {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--pink-mid);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .insta-at {
    padding: 0 10px;
    font-size: 16px;
    font-weight: 700;
    color: var(--pink);
    background: var(--pink-light);
    height: 44px;
    display: flex;
    align-items: center;
  }
  .insta-input {
    flex: 1;
    border: none;
    outline: none;
    padding: 0 12px;
    font-size: 15px;
    font-family: "Noto Sans KR", sans-serif;
    height: 44px;
    color: var(--text);
    background: white;
  }
  .insta-hint {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 12px;
    text-align: left;
  }
  #certCanvas {
    width: 100%;
    border-radius: 12px;
    display: block;
  }

  .cert-dl-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    cursor: pointer;
    font-family: "Noto Sans KR", sans-serif;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .cert-dl-btn:active { background: rgba(255,255,255,0.35); }


  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 24px 20px 20px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .modal-title {
    font-family: "Nunito", sans-serif;
    font-weight: 900;
    font-size: 17px;
    color: var(--text);
    margin-bottom: 16px;
  }
  canvas#certCanvas { width: 100%; border-radius: 12px; display: block; }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .btn-dl {
    flex: 1;
    padding: 12px;
    background: var(--pink);
    color: white;
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: "Noto Sans KR", sans-serif;
  }
  .btn-close {
    flex: 1;
    padding: 12px;
    background: var(--pink-light);
    color: var(--pink);
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: "Noto Sans KR", sans-serif;
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">
      <span class="logo-paw">🐾</span> SOBY
    </div>
    <div class="header-badge">쏘바이 온라인 펫페어 2026</div>
  </div>
  <p class="header-sub">쏘바이가 나아가는 길을 함께 응원하는 브랜드들이에요<br>구매로 브랜드와 쏘바이 모두를 응원해 주세요 🐾</p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="브랜드 이름으로 검색해보세요" oninput="render()">
  </div>

  <div class="filter-row" id="filterRow"></div>
</header>

<div class="count-row" id="countRow"></div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="certModal">
  <div class="modal-box">
    <div class="modal-title">🏅 참여 인증서 만들기</div>
    <div class="insta-input-wrap">
      <span class="insta-at">@</span>
      <input class="insta-input" id="instaId" type="text" placeholder="인스타그램 아이디" oninput="drawCert()" autocomplete="off" autocorrect="off" autocapitalize="off">
    </div>
    <p class="insta-hint">아이디를 입력하면 인증서에 반영돼요</p>
    <canvas id="certCanvas"></canvas>
    <div class="modal-actions">
      <button class="btn-dl" id="dlBtn" onclick="downloadCert()">📥 이미지 저장</button>
      <button class="btn-close" onclick="closeCert()">닫기</button>
    </div>
  </div>
</div>

<div class="support-banner">
  <div class="banner-left">
    <strong>선한 영향력을 행사해 주세요 🐾</strong>
    구매 한 번이 동물과 세상을 바꿉니다
  </div>
  <button class="cert-dl-btn" onclick="openCert()">🏅 참여 인증서</button>
</div>

let activeFilter = '전체';

function initFilters() {
  const row = document.getElementById('filterRow');
  row.innerHTML = CATEGORIES.map(c => `
    <button class="chip ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>
  `).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  initFilters();
  render();
}


function buildSlider(b, idx) {
  const slides = [];
  if (b.logo) slides.push(b.logo);
  if (b.images && b.images.length) slides.push(...b.images);

  const coupon = b.coupon ? `<span class="coupon-badge">${b.coupon}</span>` : '';
  const id = 'sl' + idx;

  if (slides.length === 0) {
    return `<div class="card-slider"><div class="slider-track"><div class="slider-slide"><div class="card-logo-placeholder">${b.name.slice(0,2).toUpperCase()}</div></div></div>${coupon}</div>`;
  }

  const imgs = slides.map(src => `<div class="slider-slide"><img src="${src}" loading="lazy"></div>`).join('');
  const dots = slides.length > 1
    ? `<div class="slider-dots">${slides.map((_, i) => `<div class="slider-dot${i===0?' active':''}"></div>`).join('')}</div>`
    : '';
  const prevBtn = slides.length > 1 ? `<button class="slider-arrow prev hidden" onclick="slideMove('${id}',-1,event)">&#8249;</button>` : '';
  const nextBtn = slides.length > 1 ? `<button class="slider-arrow next" onclick="slideMove('${id}',1,event)">&#8250;</button>` : '';

  return `<div class="card-slider" id="${id}" data-cur="0" data-total="${slides.length}">
    <div class="slider-track">${imgs}</div>
    ${prevBtn}${nextBtn}${dots}${coupon}
  </div>`;
}

function slideMove(id, dir, e) {
  e.stopPropagation();
  const el = document.getElementById(id);
  let cur = +el.dataset.cur;
  const total = +el.dataset.total;
  cur = Math.max(0, Math.min(cur + dir, total - 1));
  el.dataset.cur = cur;
  el.querySelector('.slider-track').style.transform = `translateX(-${cur * 100}%)`;
  el.querySelectorAll('.slider-dot').forEach((d, i) => d.classList.toggle('active', i === cur));
  el.querySelector('.slider-arrow.prev').classList.toggle('hidden', cur === 0);
  el.querySelector('.slider-arrow.next').classList.toggle('hidden', cur === total - 1);
}

function render() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const grid = document.getElementById('grid');
  const countRow = document.getElementById('countRow');

  let filtered = BRANDS.filter(b => {
    const matchCat = activeFilter === '전체' || b.categories.includes(activeFilter);
    const matchSearch = !query ||
      b.name.toLowerCase().includes(query) ||
      b.desc.toLowerCase().includes(query) ||
      b.categories.some(c => c.includes(query));
    return matchCat && matchSearch;
  });

  countRow.innerHTML = `브랜드 <span>${filtered.length}</span>개`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🐾</div>
        <div class="empty-title">검색 결과가 없어요</div>
        <div class="empty-sub">다른 키워드로 검색해보세요</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((b, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s" onclick="window.open('${b.url}','_blank')">
      ${buildSlider(b, i)}
      <div class="card-body">
        <div class="card-name">${b.name}</div>
        <div class="card-desc">${b.desc}</div>
        <div class="card-tags">
          ${b.categories.map(c => `<span class="tag">${c}</span>`).join('')}
        </div>
        <button class="card-cta" onclick="event.stopPropagation(); window.open('${b.url}','_blank')">바로 구매하기</button>
      </div>
    </div>
  `).join('');
}

initFilters();
render();

function openCert() {
  document.getElementById("certModal").classList.add("open");
  drawCert();
}
function closeCert() {
  document.getElementById("certModal").classList.remove("open");
}

function drawCert() {
  const canvas = document.getElementById("certCanvas");
  if (!canvas) return;
  const W = 680, H = 960;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");
  const instaId = (document.getElementById("instaId")?.value || "").trim();

  const img = new Image();
  img.onload = function() {
    ctx.clearRect(0, 0, W, H);

    // BG
    ctx.fillStyle = "#FFF9FA";
    ctx.fillRect(0, 0, W, H);

    // Top bar
    ctx.fillStyle = "#E8607A";
    ctx.fillRect(0, 0, W, 10);

    // Bottom bar
    ctx.fillStyle = "#2D6A4F";
    ctx.fillRect(0, H - 10, W, 10);

    // Outer border
    ctx.strokeStyle = "#F2AABB";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(30, 30, W - 60, H - 60);

    // Inner border
    ctx.strokeStyle = "#EEEEEE";
    ctx.lineWidth = 1;
    ctx.strokeRect(40, 40, W - 80, H - 80);

    ctx.textAlign = "center";

    // Event label
    ctx.font = "500 22px 'Noto Sans KR', sans-serif";
    ctx.fillStyle = "#2D6A4F";
    ctx.fillText("쏘바이 온라인 펫페어 2026", W / 2, 118);

    // Pink divider
    ctx.fillStyle = "#E8607A";
    ctx.fillRect(W / 2 - 40, 136, 80, 2);

    // Main title
    ctx.font = "bold 64px sans-serif";
    ctx.fillStyle = "#E8607A";
    ctx.fillText("참여 인증서", W / 2, 228);


    // Divider
    ctx.strokeStyle = "#EEEEEE";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(80, 310); ctx.lineTo(W - 80, 310);
    ctx.stroke();

    // Logo circle clip
    ctx.save();
    ctx.beginPath();
    ctx.arc(W / 2, 418, 88, 0, Math.PI * 2);
    ctx.fillStyle = "#F5F0E8";
    ctx.fill();
    ctx.clip();
    ctx.drawImage(img, W / 2 - 88, 418 - 88, 176, 176);
    ctx.restore();

    // Logo border
    ctx.beginPath();
    ctx.arc(W / 2, 418, 90, 0, Math.PI * 2);
    ctx.strokeStyle = "#F2AABB";
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Insta ID box (if entered)
    if (instaId) {
      const tag = "@" + instaId;
      ctx.font = "bold 28px sans-serif";
      const tw = ctx.measureText(tag).width;
      const bw = tw + 48, bh = 44, bx = W / 2 - bw / 2, by = 530;
      ctx.fillStyle = "#FCEEF1";
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 22);
      ctx.fill();
      ctx.strokeStyle = "#F2AABB";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = "#E8607A";
      ctx.fillText(tag, W / 2, by + 30);
    }

    const bodyY = instaId ? 630 : 576;

    // Body text
    ctx.font = "400 26px 'Noto Sans KR', sans-serif";
    ctx.fillStyle = "#555555";
    ctx.fillText("쏘바이가 나아가는 길을 함께 응원해 주셔서", W / 2, bodyY);
    ctx.fillText("진심으로 감사드립니다.", W / 2, bodyY + 40);

    // Green text
    ctx.font = "600 24px 'Noto Sans KR', sans-serif";
    ctx.fillStyle = "#2D6A4F";
    ctx.fillText("구매를 통한 선한 영향력,", W / 2, bodyY + 110);
    ctx.fillText("함께 만들어가요.", W / 2, bodyY + 148);

    // Bottom divider
    ctx.strokeStyle = "#EEEEEE";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(80, 860); ctx.lineTo(W - 80, 860);
    ctx.stroke();

    // SOBY signature
    ctx.font = "bold 30px sans-serif";
    ctx.fillStyle = "#E8607A";

function downloadCert() {
  const canvas = document.getElementById("certCanvas");
  if (!canvas) return;
  const instaId = (document.getElementById("instaId")?.value || "").trim();
  const filename = instaId ? "SOBY_펫페어_참여인증서_@" + instaId + ".png" : "SOBY_펫페어_참여인증서.png";
  const dataURL = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = dataURL;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
